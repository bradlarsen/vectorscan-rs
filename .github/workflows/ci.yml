name: CI

on:
  pull_request:

  push:
    branches:
    - main

  schedule:
  # Force a run every tuesday at at 0700 UTC
  - cron: '0 07 * * 2'


env:
  CI: '1'

  CARGO_TERM_COLOR: 'always'

  # Emit backtraces on panics (though these may be worthless without debug info).
  RUST_BACKTRACE: '1'

  # Disable incremental builds; see https://matklad.github.io/2021/09/04/fast-rust-builds.html:
  #
  #     CI builds often are closer to from-scratch builds, as changes are typically much bigger than from a local edit-compile cycle.
  #     For from-scratch builds, incremental adds an extra dependency-tracking overhead.
  #     It also significantly increases the amount of IO and the size of ./target, which make caching less effective.
  CARGO_INCREMENTAL: '0'

  # Disable debug info in CI; speeds up builds and shrinks Actions caches a bit
  CARGO_PROFILE_RELEASE_DEBUG: '0'
  CARGO_PROFILE_DEV_DEBUG: '0'
  CARGO_PROFILE_TEST_DEBUG: '0'

  # Enable Cargo output explaining why things are being rebuilt.
  # This can be useful to investigate why caching is not working as expected.
  #
  # https://stackoverflow.com/a/70174212
  # https://doc.crates.io/contrib/implementation/debugging.html#logging
  # CARGO_LOG: 'cargo::core::compiler::fingerprint=info'

jobs:
  tests:
    name: CI (${{ matrix.name }})

    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
        - name: ubuntu-22.04.x86_64.release
          os: ubuntu-22.04
          rust: stable
          profile: release
          features: unit_hyperscan
          install_dependencies: |
            sudo apt-get update && sudo apt-get install zsh libboost-all-dev
          check_docs: false
          use_ninja: false

        - name: ubuntu-22.04.x86_64.test
          os: ubuntu-22.04
          rust: stable
          profile: test
          features: unit_hyperscan
          install_dependencies: |
            sudo apt-get update && sudo apt-get install zsh libboost-all-dev
          check_docs: true
          use_ninja: false

        - name: ubuntu-22.04.x86_64.release.cpu_native
          os: ubuntu-22.04
          rust: stable
          profile: release
          features: unit_hyperscan,cpu_native
          install_dependencies: |
            sudo apt-get update && sudo apt-get install zsh libboost-all-dev
          check_docs: false
          use_ninja: false


        - name: ubuntu-24.04.x86_64.release
          os: ubuntu-24.04
          rust: stable
          profile: release
          features: unit_hyperscan
          install_dependencies: |
            sudo apt-get update && sudo apt-get install zsh libboost-all-dev
          check_docs: false
          use_ninja: false

        - name: ubuntu-24.04.x86_64.test
          os: ubuntu-24.04
          rust: stable
          profile: test
          features: unit_hyperscan
          install_dependencies: |
            sudo apt-get update && sudo apt-get install zsh libboost-all-dev
          check_docs: true
          use_ninja: false

        - name: ubuntu-24.04.x86_64.release.cpu_native
          os: ubuntu-24.04
          rust: stable
          profile: release
          features: unit_hyperscan,cpu_native
          install_dependencies: |
            sudo apt-get update && sudo apt-get install zsh libboost-all-dev
          check_docs: false
          use_ninja: false


        - name: ubuntu-24.04.arm64.release
          os: ubuntu-24.04-arm
          rust: stable
          profile: release
          features: unit_hyperscan
          install_dependencies: |
            sudo apt-get update && sudo apt-get install zsh libboost-all-dev
          check_docs: false
          use_ninja: false

        - name: ubuntu-24.04.arm64.test
          os: ubuntu-24.04-arm
          rust: stable
          profile: test
          features: unit_hyperscan
          install_dependencies: |
            sudo apt-get update && sudo apt-get install zsh libboost-all-dev
          check_docs: true
          use_ninja: false

        - name: ubuntu-24.04.arm64.release.cpu_native
          os: ubuntu-24.04-arm
          rust: stable
          profile: release
          features: unit_hyperscan,cpu_native
          install_dependencies: |
            sudo apt-get update && sudo apt-get install zsh libboost-all-dev
          check_docs: false
          use_ninja: false


        - name: macos-14.arm64.test
          os: macos-14  # m1-based macos
          rust: stable
          profile: test
          features: unit_hyperscan
          install_dependencies: |
            brew install coreutils boost
          check_docs: false
          use_ninja: true

        - name: macos-14.arm64.release
          os: macos-14  # m1-based macos
          rust: stable
          profile: release
          features: unit_hyperscan
          install_dependencies: |
            brew install coreutils boost
          check_docs: false
          use_ninja: true

        # A build that runs with `bindgen` enabled
        - name: macos-14.arm64.gen.release
          os: macos-14  # m1-based macos
          rust: stable
          profile: release
          features: unit_hyperscan,gen
          install_dependencies: |
            brew install coreutils boost
          check_docs: false
          use_ninja: true

        - name: macos-14.arm64.release.cpu_native
          os: macos-14  # m1-based macos
          rust: stable
          profile: release
          features: unit_hyperscan,cpu_native
          install_dependencies: |
            brew install coreutils boost
          check_docs: false
          use_ninja: true


        - name: macos-15.arm64.test
          os: macos-15
          rust: stable
          profile: test
          features: unit_hyperscan
          install_dependencies: |
            brew install coreutils boost
          check_docs: false
          use_ninja: true

        - name: macos-15.arm64.release
          os: macos-15
          rust: stable
          profile: release
          features: unit_hyperscan
          install_dependencies: |
            brew install coreutils boost
          check_docs: false
          use_ninja: true

        # A build that runs with `bindgen` enabled
        - name: macos-15.arm64.gen.release
          os: macos-15
          rust: stable
          profile: release
          features: unit_hyperscan,gen
          install_dependencies: |
            brew install coreutils boost
          check_docs: false
          use_ninja: true

        - name: macos-15.arm64.release.cpu_native
          os: macos-15
          rust: stable
          profile: release
          features: unit_hyperscan,cpu_native
          install_dependencies: |
            brew install coreutils boost
          check_docs: false
          use_ninja: true


        - name: macos-26.arm64.test
          os: macos-26
          rust: stable
          profile: test
          features: unit_hyperscan
          install_dependencies: |
            brew install coreutils boost
          check_docs: false
          use_ninja: true

        - name: macos-26.arm64.release
          os: macos-26
          rust: stable
          profile: release
          features: unit_hyperscan
          install_dependencies: |
            brew install coreutils boost
          check_docs: false
          use_ninja: true

        # A build that runs with `bindgen` enabled
        - name: macos-26.arm64.gen.release
          os: macos-26
          rust: stable
          profile: release
          features: unit_hyperscan,gen
          install_dependencies: |
            brew install coreutils boost
          check_docs: false
          use_ninja: true

        - name: macos-26.arm64.release.cpu_native
          os: macos-26
          rust: stable
          profile: release
          features: unit_hyperscan,cpu_native
          install_dependencies: |
            brew install coreutils boost
          check_docs: false
          use_ninja: true

    env:
      CMAKE_GENERATOR: ${{ (matrix.use_ninja && 'Ninja') || 'Unix Makefiles' }}

    steps:
    - uses: actions/checkout@v6
      with:
        persist-credentials: false

    - name: Install dependencies
      run: ${{ matrix.install_dependencies }}

    - name: Install Rust toolchain
      id: install-rust-toolchain
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ matrix.rust }}

    # N.B. cache disabled since certain build configurations end up producing
    # microarchitecture-specific code that is not portable across CPUs
    # generally

    # - name: Cache
    #   uses: Swatinem/rust-cache@v2
    #   with:
    #     prefix-key: 'ci-tests'
    #     key: ${{ matrix.name }}

    - name: Build tests
      run: cargo test --no-run -vv --profile=${{ matrix.profile }} --features=${{ matrix.features }} --timings

    - name: Run tests
      run: cargo test -vv --profile=${{ matrix.profile }} --features=${{ matrix.features }} --timings

    - name: Check documentation
      if: ${{ matrix.check_docs }}
      env:
        RUSTDOCFLAGS: -D warnings
      run: cargo doc --verbose --profile=${{ matrix.profile }} --features=${{ matrix.features }} --timings --no-deps --document-private-items

    # See https://doc.rust-lang.org/nightly/cargo/reference/timings.html for details
    - name: Upload build timings
      uses: actions/upload-artifact@v7
      with:
        name: build-timings.${{ matrix.name }}
        path: target/cargo-timings
        if-no-files-found: error

  windows-x64-tests:
    name: CI (${{ matrix.name }})
    runs-on: windows-2025

    strategy:
      matrix:
        include:
        - name: windows-2025.x86_64.release
          profile: release
          features: ''
          use_cpu_native: OFF
        - name: windows-2025.x86_64.test
          profile: test
          features: ''
          use_cpu_native: OFF
        - name: windows-2025.x86_64.release.cpu_native
          profile: release
          features: cpu_native
          use_cpu_native: ON

    env:
      CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER: x86_64-w64-mingw32-gcc

    steps:
    - uses: actions/checkout@v6
      with:
        persist-credentials: false

    - uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        path-type: inherit
        install: >-
          git
          make
          mingw-w64-x86_64-toolchain
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-boost
          mingw-w64-x86_64-pkgconf
          mingw-w64-x86_64-ragel
          mingw-w64-x86_64-pcre2
          mingw-w64-x86_64-python
          mingw-w64-x86_64-zlib

    - name: Install Rust toolchain
      id: install-rust-toolchain-windows
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: stable
        targets: x86_64-pc-windows-gnu

    - name: Build Vectorscan
      shell: msys2 {0}
      run: |
        set -euxo pipefail
        repo_root="$(pwd)"
        vectorscan_src="$repo_root/vectorscan-rs-sys/vectorscan"
        build_dir=/tmp/vectorscan-build
        rm -rf "$build_dir"
        mkdir -p "$build_dir"
        cd "$build_dir"
        cmake "$vectorscan_src" \
          -G "MinGW Makefiles" \
          -DCMAKE_BUILD_TYPE=Release \
          -DBUILD_SHARED_LIBS=OFF \
          -DBUILD_STATIC_LIBS=ON \
          -DBUILD_UNIT=OFF \
          -DBUILD_TOOLS=OFF \
          -DFAT_RUNTIME=OFF \
          -DUSE_CPU_NATIVE=${{ matrix.use_cpu_native }} \
          -DCMAKE_C_COMPILER=gcc \
          -DCMAKE_CXX_COMPILER=g++ \
          -DCMAKE_INSTALL_PREFIX=/mingw64
        mingw32-make -j"$(nproc)"
        mingw32-make install

        libgcc_a_path="$(x86_64-w64-mingw32-gcc -print-libgcc-file-name)"
        libgcc_dir="$(dirname "$libgcc_a_path")"
        {
          echo "HYPERSCAN_ROOT=$(cygpath -m /mingw64)"
          echo "HYPERSCAN_LINK_KIND=static"
          echo "LIBHS_NO_PKG_CONFIG=1"
          echo "LIBRARY_PATH=/mingw64/lib:${LIBRARY_PATH:-}"
          echo "CPATH=/mingw64/include:${CPATH:-}"
          echo "PKG_CONFIG_ALLOW_CROSS=1"
          echo "PKG_CONFIG_PATH=/mingw64/lib/pkgconfig"
          echo "PKG_CONFIG_LIBDIR=/mingw64/lib/pkgconfig"
          echo "CARGO_TARGET_X86_64_PC_WINDOWS_GNU_RUSTFLAGS=-L native=/mingw64/lib -L native=$libgcc_dir -C target-feature=+crt-static -C link-arg=-static"
        } >> "$GITHUB_ENV"

    - name: Build tests
      shell: msys2 {0}
      env:
        FEATURES: ${{ matrix.features }}
        PROFILE: ${{ matrix.profile }}
      run: |
        features_arg=()
        if [ -n "$FEATURES" ]; then
          features_arg=(--features="$FEATURES")
        fi
        cargo test --no-run -vv --profile="$PROFILE" --target x86_64-pc-windows-gnu "${features_arg[@]}" --timings

    - name: Run tests
      shell: msys2 {0}
      env:
        FEATURES: ${{ matrix.features }}
        PROFILE: ${{ matrix.profile }}
      run: |
        features_arg=()
        if [ -n "$FEATURES" ]; then
          features_arg=(--features="$FEATURES")
        fi
        cargo test -vv --profile="$PROFILE" --target x86_64-pc-windows-gnu "${features_arg[@]}" --timings

    - name: Upload build timings
      uses: actions/upload-artifact@v7
      with:
        name: build-timings.${{ matrix.name }}
        path: target/cargo-timings
        if-no-files-found: error

  windows-arm64-tests:
    name: CI (${{ matrix.name }})
    runs-on: windows-11-arm

    strategy:
      matrix:
        include:
        - name: windows-11.arm64.release
          profile: release
          features: ''
          use_cpu_native: OFF
        - name: windows-11.arm64.test
          profile: test
          features: ''
          use_cpu_native: OFF
        - name: windows-11.arm64.release.cpu_native
          profile: release
          features: cpu_native
          use_cpu_native: ON

    env:
      CC: clang
      CXX: clang++
      CARGO_TARGET_AARCH64_PC_WINDOWS_GNULLVM_LINKER: clang

    steps:
    - uses: actions/checkout@v6
      with:
        persist-credentials: false

    - uses: msys2/setup-msys2@v2
      with:
        msystem: CLANGARM64
        update: true
        path-type: inherit
        install: >-
          git
          make
          mingw-w64-clang-aarch64-toolchain
          mingw-w64-clang-aarch64-cmake
          mingw-w64-clang-aarch64-boost
          mingw-w64-clang-aarch64-pkgconf
          mingw-w64-clang-aarch64-ragel
          mingw-w64-clang-aarch64-pcre2
          mingw-w64-clang-aarch64-python
          mingw-w64-clang-aarch64-zlib

    - name: Install Rust toolchain
      id: install-rust-toolchain-windows-arm64
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: stable
        targets: aarch64-pc-windows-gnullvm

    - name: Build Vectorscan
      shell: msys2 {0}
      run: |
        set -euxo pipefail
        repo_root="$(pwd)"
        vectorscan_src="$repo_root/vectorscan-rs-sys/vectorscan"
        build_dir=/tmp/vectorscan-arm64-build
        rm -rf "$build_dir"
        mkdir -p "$build_dir"
        cd "$build_dir"
        cmake "$vectorscan_src" \
          -G "MinGW Makefiles" \
          -DCMAKE_BUILD_TYPE=Release \
          -DBUILD_SHARED_LIBS=OFF \
          -DBUILD_STATIC_LIBS=ON \
          -DBUILD_UNIT=OFF \
          -DBUILD_TOOLS=OFF \
          -DFAT_RUNTIME=OFF \
          -DUSE_CPU_NATIVE=${{ matrix.use_cpu_native }} \
          -DCMAKE_SYSTEM_NAME=Windows \
          -DCMAKE_SYSTEM_PROCESSOR=ARM64 \
          -DCMAKE_C_COMPILER=clang \
          -DCMAKE_CXX_COMPILER=clang++ \
          -DCMAKE_INSTALL_PREFIX=/clangarm64
        mingw32-make -j"$(nproc)"
        mingw32-make install

        {
          echo "HYPERSCAN_ROOT=$(cygpath -m /clangarm64)"
          echo "HYPERSCAN_LINK_KIND=static"
          echo "LIBHS_NO_PKG_CONFIG=1"
          echo "LIBRARY_PATH=/clangarm64/lib:${LIBRARY_PATH:-}"
          echo "CPATH=/clangarm64/include:${CPATH:-}"
          echo "PKG_CONFIG_ALLOW_CROSS=1"
          echo "PKG_CONFIG_PATH=/clangarm64/lib/pkgconfig"
          echo "PKG_CONFIG_LIBDIR=/clangarm64/lib/pkgconfig"
          echo "CARGO_TARGET_AARCH64_PC_WINDOWS_GNULLVM_RUSTFLAGS=-L native=/clangarm64/lib -C target-feature=+crt-static -C link-arg=-static"
        } >> "$GITHUB_ENV"

    - name: Build tests
      shell: msys2 {0}
      env:
        FEATURES: ${{ matrix.features }}
        PROFILE: ${{ matrix.profile }}
      run: |
        features_arg=()
        if [ -n "$FEATURES" ]; then
          features_arg=(--features="$FEATURES")
        fi
        cargo test --no-run -vv --profile="$PROFILE" --target aarch64-pc-windows-gnullvm "${features_arg[@]}" --timings

    - name: Run tests
      shell: msys2 {0}
      env:
        FEATURES: ${{ matrix.features }}
        PROFILE: ${{ matrix.profile }}
      run: |
        features_arg=()
        if [ -n "$FEATURES" ]; then
          features_arg=(--features="$FEATURES")
        fi
        cargo test -vv --profile="$PROFILE" --target aarch64-pc-windows-gnullvm "${features_arg[@]}" --timings

    - name: Upload build timings
      uses: actions/upload-artifact@v7
      with:
        name: build-timings.${{ matrix.name }}
        path: target/cargo-timings
        if-no-files-found: error
